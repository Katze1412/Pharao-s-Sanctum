<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pharao's Sanctum</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0a06">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500&family=Noto+Sans+Egyptian+Hieroglyphs&display=swap');

:root{
  --bg:#0d0a06;
  --bg-alt:#140e07;
  --panel:#1c150c;
  --panel-2:#241b0f;
  --panel-3:#2c2010;
  --gold:#c9a227;
  --gold-bright:#e8c468;
  --crimson:#8a2332;
  --crimson-bright:#b53249;
  --teal:#3f8f86;
  --teal-bright:#56b3a8;
  --lapis:#1f3f6e;
  --lapis-bright:#4d7ec2;
  --text:#ede3d0;
  --text-muted:#a8967a;
  --border:#3a2c16;
  --radius:10px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:radial-gradient(circle at 20% -10%, #221708 0%, var(--bg) 55%);
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
  min-height:100vh;
  -webkit-tap-highlight-color:transparent;
}
h1,h2,h3{font-family:'Cinzel',serif;letter-spacing:.5px;margin:0;}
.mono{font-family:'JetBrains Mono',monospace;}

.app{max-width:760px;margin:0 auto;padding:0 14px 100px;}

/* Topbar */
.topbar{
  position:sticky;top:0;z-index:20;
  background:linear-gradient(180deg, var(--bg) 70%, rgba(13,10,6,0));
  padding:18px 0 10px;
}
.topbar h1{
  font-size:22px;color:var(--gold-bright);
  text-shadow:0 0 12px rgba(201,162,39,.35);
  display:flex;align-items:center;gap:8px;
}
.hiero{font-family:'Noto Sans Egyptian Hieroglyphs', sans-serif;line-height:1;}

.title-cartouche{
  display:inline-flex;align-items:center;gap:9px;
  border:2px solid var(--gold);border-radius:999px;
  padding:6px 18px 6px 12px;position:relative;
}
.title-cartouche::before,.title-cartouche::after{
  content:'';position:absolute;top:-4px;bottom:-4px;width:3px;
  background:var(--gold);border-radius:2px;
}
.title-cartouche::before{left:-3px;}
.title-cartouche::after{right:-3px;}
.title-cartouche h1{font-size:20px;}
.hiero-eye{
  font-size:21px;color:var(--gold-bright);
  text-shadow:0 0 8px var(--gold), 0 0 16px rgba(201,162,39,.5);
}
.settings-btn{
  background:none;border:none;color:var(--text-muted);font-size:16px;
  cursor:pointer;padding:4px 6px;line-height:1;
}
.settings-btn:hover{color:var(--gold-bright);}

.hiero-rule{
  font-family:'Noto Sans Egyptian Hieroglyphs', sans-serif;line-height:1;
  text-align:center;font-size:13px;letter-spacing:6px;
  color:var(--gold);opacity:.3;margin-top:14px;
  white-space:nowrap;overflow:hidden;
}
.searchbar{
  margin-top:12px;display:flex;align-items:center;gap:8px;
  background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:9px 12px;
}
.searchbar input{
  background:none;border:none;outline:none;color:var(--text);
  font-family:'Rajdhani',sans-serif;font-size:15px;width:100%;
}
.searchbar input::placeholder{color:var(--text-muted);}
.searchbar svg{flex-shrink:0;opacity:.7;}

/* Tabs */
.tabs{display:flex;gap:6px;margin-top:14px;}
.tab{
  flex:1;text-align:center;padding:9px 6px;border-radius:7px;
  background:var(--panel);border:1px solid var(--border);
  color:var(--text-muted);font-weight:600;font-size:13.5px;
  cursor:pointer;user-select:none;transition:.15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.tab .count{
  background:rgba(255,255,255,.08);border-radius:10px;padding:0 6px;
  font-size:11px;font-family:'JetBrains Mono',monospace;
}
.tab.active{
  background:linear-gradient(180deg, var(--panel-3), var(--panel-2));
  color:var(--gold-bright);border-color:var(--gold);
  box-shadow:inset 0 0 0 1px rgba(201,162,39,.15);
}
.tab.active .count{background:rgba(201,162,39,.18);color:var(--gold-bright);}

.subtabs{display:flex;gap:0;margin-top:14px;border-bottom:1px solid var(--border);}
.subtabs button{
  background:none;border:none;color:var(--text-muted);
  font-family:'Cinzel',serif;font-size:13px;font-weight:600;
  padding:8px 4px;margin-right:20px;cursor:pointer;position:relative;
}
.subtabs button.active{color:var(--gold-bright);}
.subtabs button.active::after{
  content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--gold);
}

/* Group controls */
.groupbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:18px;margin-bottom:8px;
}
.groupbar .label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
.grouptoggle{display:flex;gap:4px;}
.grouptoggle button{
  background:var(--panel);border:1px solid var(--border);color:var(--text-muted);
  font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;
  padding:5px 10px;border-radius:6px;cursor:pointer;
}
.grouptoggle button.active{background:var(--gold);color:#1a1206;border-color:var(--gold);}

/* Group (binder tab) */
.group{margin-bottom:16px;}
.group-header{
  position:relative;display:flex;align-items:center;justify-content:space-between;
  background:var(--panel-2);border-left:4px solid var(--gold);
  padding:10px 14px 10px 16px;border-radius:0 8px 8px 0;
  cursor:pointer;user-select:none;
}
.group-header::before{
  content:'';position:absolute;left:-4px;top:50%;transform:translateY(-50%);
  width:8px;height:8px;border-radius:50%;background:var(--bg);border:2px solid var(--gold);
}
.group-header .title{font-family:'Cinzel',serif;font-size:14.5px;color:var(--gold-bright);}
.group-header .sub{font-size:12px;color:var(--text-muted);margin-left:8px;}
.group-header .chev{transition:.2s;color:var(--text-muted);}
.group.collapsed .chev{transform:rotate(-90deg);}
.group-items{padding:8px 0 0 6px;}
.group.collapsed .group-items{display:none;}

/* Card row (sleeve) */
.card-row{
  position:relative;display:flex;align-items:center;gap:12px;
  background:linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%);
  border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;margin-bottom:7px;
  transition:.15s;overflow:hidden;cursor:pointer;
}
.card-row:hover{border-color:var(--gold);box-shadow:0 0 0 1px rgba(201,162,39,.25), 0 4px 14px rgba(0,0,0,.35);}
.card-row::after{
  content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;
  background:linear-gradient(115deg, transparent, rgba(232,196,104,.08), transparent);
  transition:left .5s;
}
.card-row:hover::after{left:120%;}
.qty-control{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.qty-btn{
  width:24px;height:24px;border-radius:6px;border:1px solid var(--border);
  background:var(--panel-2);color:var(--gold-bright);font-size:15px;line-height:0;
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
}
.qty-btn:hover{border-color:var(--gold);background:var(--panel-3);}
.qty-btn:active{transform:scale(.92);}
.card-row .qty{
  font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold-bright);
  background:rgba(201,162,39,.12);border:1px solid var(--border);
  border-radius:6px;min-width:30px;text-align:center;padding:3px 0;flex-shrink:0;
}
.card-row .info{flex:1;min-width:0;}
.card-row .name{font-weight:700;font-size:15px;color:var(--text);}
.card-row .meta{font-size:12px;color:var(--text-muted);margin-top:2px;}
.card-row .meta .mono{color:var(--gold-bright);}
.card-row .badges{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.card-row.overdue{border-color:var(--crimson-bright);box-shadow:0 0 0 1px rgba(181,50,73,.25);}
.badge{
  font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  padding:3px 7px;border-radius:5px;
}
.badge.lent{background:rgba(63,143,134,.18);color:var(--teal-bright);border:1px solid var(--teal);}
.badge.lent-overdue{background:rgba(181,50,73,.25);color:#f5b4bd;border:1px solid var(--crimson-bright);}
.badge.sale{background:rgba(31,63,110,.25);color:#9fc1ed;border:1px solid var(--lapis-bright);}

.empty-state{
  text-align:center;padding:48px 16px;color:var(--text-muted);
}
.empty-state .hiero-glyph{
  font-family:'Noto Sans Egyptian Hieroglyphs', sans-serif;line-height:1;
  font-size:46px;color:var(--gold);opacity:.35;display:block;margin-bottom:10px;
  text-shadow:0 0 18px rgba(201,162,39,.25);
}
.empty-state h3{color:var(--gold-bright);font-size:16px;margin-bottom:6px;}
.empty-state p{font-size:13.5px;margin:0;}

/* Floating Action Button */
.fab{
  position:fixed;bottom:26px;right:22px;z-index:30;
  width:58px;height:58px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--gold-bright), var(--gold) 65%);
  color:#1a1206;border:none;font-size:28px;line-height:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(201,162,39,.45), 0 0 0 1px rgba(0,0,0,.3);
  cursor:pointer;transition:.15s;
}
.fab:hover{transform:scale(1.06);}
.fab:active{transform:scale(.96);}
#fab-note{font-size:24px;}
.fab-bell{
  bottom:96px;width:44px;height:44px;font-size:19px;
  background:radial-gradient(circle at 35% 30%, var(--crimson-bright), #5a1420 65%);
}

/* Offline-Banner */
.offline-banner{
  background:rgba(138,35,50,.18);border-bottom:1px solid var(--crimson-bright);
  color:#f0a3ad;font-size:12.5px;padding:8px 14px;text-align:center;
}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(8,6,3,.72);backdrop-filter:blur(2px);
  display:flex;align-items:flex-end;justify-content:center;z-index:50;
}
@media(min-width:640px){.modal-overlay{align-items:center;}}
.modal{
  background:var(--bg-alt);border:1px solid var(--border);
  border-radius:14px 14px 0 0;width:100%;max-width:520px;max-height:92vh;
  overflow-y:auto;padding:18px 18px 26px;
}
@media(min-width:640px){.modal{border-radius:14px;}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.modal-head h2{font-size:18px;color:var(--gold-bright);}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;line-height:0;}

.modal-tabs{display:flex;gap:6px;margin-bottom:16px;}
.modal-tabs button{
  flex:1;background:var(--panel);border:1px solid var(--border);color:var(--text-muted);
  font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12.5px;
  padding:8px 4px;border-radius:7px;cursor:pointer;
}
.modal-tabs button.active{background:var(--panel-3);color:var(--gold-bright);border-color:var(--gold);}

.field{margin-bottom:12px;}
.field label{display:block;font-size:11.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;background:var(--panel);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;padding:9px 11px;outline:none;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.hint{font-size:12px;color:var(--text-muted);margin:-4px 0 12px;}

.btn{
  width:100%;padding:11px;border-radius:8px;border:none;font-weight:700;
  font-family:'Rajdhani',sans-serif;font-size:15px;cursor:pointer;letter-spacing:.3px;
}
.btn-primary{background:linear-gradient(180deg, var(--gold-bright), var(--gold));color:#1a1206;}
.btn-secondary{background:var(--panel);border:1px solid var(--border);color:var(--text);}
.btn-danger{background:rgba(138,35,50,.18);border:1px solid var(--crimson-bright);color:#f0a3ad;}
.btn-row{display:flex;gap:8px;margin-top:6px;}
.btn-row .btn{flex:1;}

.toggle-row{display:flex;gap:8px;margin-bottom:12px;}
.toggle-row button{
  flex:1;padding:9px;border-radius:7px;border:1px solid var(--border);background:var(--panel);
  color:var(--text-muted);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;cursor:pointer;
}
.toggle-row button.active{background:var(--panel-3);color:var(--gold-bright);border-color:var(--gold);}

.scan-drop{
  border:2px dashed var(--border);border-radius:10px;padding:28px 16px;text-align:center;
  color:var(--text-muted);font-size:13.5px;cursor:pointer;
}
.scan-drop:hover{border-color:var(--gold);}
.scan-preview{width:100%;border-radius:8px;margin-bottom:12px;max-height:220px;object-fit:contain;background:#000;}
.scan-status{font-size:13px;color:var(--gold-bright);text-align:center;margin:8px 0;}
.scan-candidates{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.scan-candidate-btn{
  background:var(--panel);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;
  padding:9px 12px;text-align:left;cursor:pointer;
}
.scan-candidate-btn:hover{border-color:var(--gold);color:var(--gold-bright);background:var(--panel-2);}

textarea.csv-input{min-height:120px;font-family:'JetBrains Mono',monospace;font-size:12.5px;resize:vertical;}

.toast{
  position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
  background:var(--panel-3);border:1px solid var(--gold);color:var(--gold-bright);
  padding:9px 16px;border-radius:8px;font-size:13.5px;z-index:60;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.toast.show{opacity:1;}

.stats-row{display:flex;gap:10px;margin-top:14px;}
.stat{
  flex:1;background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;text-align:center;
}
.stat .num{font-family:'JetBrains Mono',monospace;font-size:17px;color:var(--gold-bright);font-weight:700;}
.stat .lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

.backup-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.backup-row button{
  flex:1;min-width:120px;background:var(--panel);border:1px solid var(--border);color:var(--text-muted);
  font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;
  padding:7px 6px;border-radius:7px;cursor:pointer;
}
.backup-row button:hover{border-color:var(--gold);color:var(--gold-bright);}

.loc-item{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--panel);border:1px solid var(--border);border-radius:6px;
  padding:7px 10px;margin-bottom:6px;font-size:14px;
}
.loc-item button{background:none;border:none;color:var(--text-muted);font-size:17px;cursor:pointer;line-height:0;}
.loc-item button:hover{color:var(--crimson-bright);}

@media(prefers-reduced-motion:reduce){*{transition:none!important;}}

.login-screen{
  max-width:380px;margin:18vh auto 0;padding:28px 24px;
  background:var(--panel);border:1px solid var(--border);border-radius:14px;
}
.login-screen h1{
  font-size:22px;color:var(--gold-bright);text-align:center;margin-bottom:14px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  text-shadow:0 0 12px rgba(201,162,39,.35);
}
.login-screen input{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;padding:10px 12px;
  outline:none;margin-bottom:12px;
}
.login-screen input:focus{border-color:var(--gold);}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div id="modal-root"></div>
<div id="locmodal-root"></div>
<div id="settingsmodal-root"></div>
<div id="notemodal-root"></div>
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/offline.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/render-main.js"></script>
<script src="js/listeners-main.js"></script>
<script src="js/cardmarket.js"></script>
<script src="js/modal-core.js"></script>
<script src="js/settings.js"></script>
<script src="js/csv-import.js"></script>
<script src="js/scan-ocr.js"></script>
<script src="js/app.js"></script>
</body>
</html>
